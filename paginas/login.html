<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="../css/style-login.css">
    <script src="../JS/login.js" defer></script>
</head>
<body>

    <div class="login-container">
        <h1>Entrar</h1>
        <p class="subtitulo">Acesse sua conta para continuar</p>

        <form id="loginForm">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required 
                       placeholder="digite seu email">
            </div>

            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required 
                       placeholder="digite sua senha">
            </div>

            <div class="form-options">
                <label class="checkbox-lembrar">
                    <input type="checkbox" id="lembrar" name="lembrar">
                    <span>Lembrar-me</span>
                </label>
                <a href="recuperar-senha.html" class="link-esqueci">Esqueci minha senha</a>
            </div>

            <button type="submit" class="btn-entrar">Entrar</button>
        </form>

        <div class="rodape-login">
            <p>Ainda não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
        </div>
    </div>

</body>
</html>
